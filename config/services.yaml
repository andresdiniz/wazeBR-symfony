parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # TenantContext como serviço compartilhado (shared: true é o default)
    App\Service\TenantContext:
        arguments:
            $security: '@security.helper'
            $partnerRepository: '@App\Repository\PartnerRepository'

    # HttpClient com timeout padrão para coleta
    Symfony\Contracts\HttpClient\HttpClientInterface:
        class: Symfony\Component\HttpClient\HttpClient
        factory: ['Symfony\Component\HttpClient\HttpClient', 'create']
        arguments:
            - { timeout: 30, headers: { 'User-Agent': 'WazeBR-SaaS/1.0' } }
