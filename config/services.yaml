parameters:
    app.api_externa_token: '%env(string:API_EXTERNA_TOKEN)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Controller\ApiExternaController:
        arguments:
            $apiExternaToken: '%app.api_externa_token%'
