security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_dashboard
                username_parameter: email
                password_parameter: password
                enable_csrf: true
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800

    access_control:
        - { path: ^/login,           roles: PUBLIC_ACCESS }
        - { path: ^/redefinir-senha, roles: PUBLIC_ACCESS }
        - { path: ^/health,          roles: PUBLIC_ACCESS }
        - { path: ^/api/externa,     roles: PUBLIC_ACCESS }
        - { path: ^/,                roles: ROLE_USER }
