security:
  password_hashers:
    App\Entity\User:
      algorithm: bcrypt
      cost: 12

  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    api_externa:
      pattern: ^/api/externa
      stateless: true

    main:
      lazy: true
      provider: app_user_provider
      form_login:
        login_path: auth_login
        check_path: auth_login
        username_parameter: email
        password_parameter: password
        default_target_path: dashboard_index
        enable_csrf: true
      logout:
        path: auth_logout
        target: auth_login
      remember_me:
        secret: '%kernel.secret%'
        lifetime: 604800
        always_remember_me: false

  access_control:
    # Rotas públicas
    - { path: ^/$,              roles: PUBLIC_ACCESS }
    - { path: ^/login,          roles: PUBLIC_ACCESS }
    - { path: ^/senha,          roles: PUBLIC_ACCESS }
    - { path: ^/api/externa,    roles: PUBLIC_ACCESS }
    - { path: ^/cron/run$,      roles: PUBLIC_ACCESS }

    # Área exclusiva do super admin (gestão de parceiros)
    - { path: ^/admin/parceiros, roles: ROLE_SUPER_ADMIN }

    # Área administrativa do parceiro (account admin + super admin)
    - { path: ^/admin,          roles: ROLE_ACCOUNT_ADMIN }

    # Tudo mais exige ao menos ROLE_USER
    - { path: ^/,               roles: ROLE_USER }

  role_hierarchy:
    # ROLE_FIELD_AGENT herda ROLE_USER (acesso base de visualização)
    ROLE_FIELD_AGENT:   ROLE_USER

    # ROLE_ACCOUNT_ADMIN herda ROLE_USER (pode ver tudo que usuário vê)
    ROLE_ACCOUNT_ADMIN: ROLE_USER

    # ROLE_ADMIN é alias de ROLE_ACCOUNT_ADMIN (retrocompatibilidade)
    ROLE_ADMIN:         ROLE_ACCOUNT_ADMIN

    # ROLE_SUPER_ADMIN herda tudo
    ROLE_SUPER_ADMIN:   [ROLE_ACCOUNT_ADMIN, ROLE_ADMIN]
