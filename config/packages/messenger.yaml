framework:
    messenger:
        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    use_notify: true
                    check_delayed_interval: 60000
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 0

            # Transporte do Symfony Scheduler
            # DSN = symfony://scheduler_{nome_do_AsSchedule}
            # WazeFeedSchedule usa #[AsSchedule('main')] => symfony://scheduler_main
            # Worker: php bin/console messenger:consume scheduler_waze_feed --time-limit=3600 -vv
            scheduler_waze_feed:
                dsn: 'symfony://scheduler_main'

        routing:
            App\Scheduler\Message\FetchWazeAlertsMessage:  scheduler_waze_feed
            App\Scheduler\Message\FetchWazeTrafficMessage: scheduler_waze_feed
            App\Scheduler\Message\CollectWazeFeedMessage:  scheduler_waze_feed
            App\Scheduler\Message\CollectWazeTvtMessage:   scheduler_waze_feed
