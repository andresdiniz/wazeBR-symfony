framework:
    messenger:
        # Transporte s\u00edncrono para desenvolvimento local.
        # Em produ\u00e7\u00e3o, troque 'sync' por 'doctrine' ou 'redis'.
        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    use_notify: true
                    check_delayed_interval: 60000
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 0

            # Transporte dedicado ao Scheduler Waze
            scheduler_waze_feed:
                dsn: 'symfony://scheduler_waze_feed'

        routing:
            # Mensagens do scheduler rodam no transporte do scheduler
            App\Scheduler\Message\FetchWazeAlertsMessage: scheduler_waze_feed
